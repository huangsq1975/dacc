<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>錢包互動架構設計 — 完整簡報</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --page-w: 1200px;
    --gap: 32px;
    --bar-h: 52px;
  }

  body {
    background: #2B2B3A;
    font-family: 'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', Arial, sans-serif;
    min-height: 100vh;
  }

  /* ── Fixed top bar ── */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    height: var(--bar-h);
    background: #12122A;
    border-bottom: 2px solid #C62828;
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,.5);
  }

  .topbar-title {
    font-size: 15px;
    font-weight: bold;
    color: #fff;
    letter-spacing: .5px;
  }

  .topbar-title em {
    color: #EF5350;
    font-style: normal;
    margin-right: 6px;
  }

  .topbar-sep { flex: 1; }

  /* page jump pills */
  .jump-bar {
    display: flex;
    gap: 6px;
  }

  .jump-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 11px;
    border-radius: 20px;
    border: 1px solid #3A3A60;
    background: transparent;
    color: #9090BB;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }

  .jump-btn:hover {
    background: #C62828;
    border-color: #C62828;
    color: #fff;
  }

  .jump-btn .n {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: rgba(255,255,255,.1);
    font-size: 10px;
    font-weight: bold;
  }

  /* ── Scroll container ── */
  .scroll-area {
    padding-top: calc(var(--bar-h) + var(--gap));
    padding-bottom: 60px;
    overflow-x: auto;
  }

  /* ── Page wrapper ── */
  .pages {
    width: var(--page-w);
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: var(--gap);
  }

  /* ── Single page card ── */
  .page-card {
    background: #fff;
    border-radius: 4px;
    box-shadow: 0 4px 24px rgba(0,0,0,.45), 0 1px 4px rgba(0,0,0,.3);
    overflow: hidden;
    position: relative;
  }

  /* Page number badge (top-left corner) */
  .page-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
    background: #C62828;
    color: #fff;
    font-size: 11px;
    font-weight: bold;
    padding: 3px 10px;
    border-radius: 10px;
    pointer-events: none;
    letter-spacing: .5px;
  }

  /* Page title strip (above iframe) */
  .page-header {
    background: #FAFAFA;
    border-bottom: 1px solid #E8E8E8;
    padding: 10px 20px 10px 44px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .page-header-title {
    font-size: 13px;
    font-weight: bold;
    color: #333;
  }

  /* iframe */
  .page-card iframe {
    display: block;
    width: 100%;
    border: none;
    overflow: hidden;
  }

  /* ── Divider between pages ── */
  .page-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #4A4A6A;
    font-size: 11px;
    padding: 0 8px;
  }

  .page-divider::before,
  .page-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #3A3A54;
  }

  /* ── Scroll-to-top ── */
  #goto-top {
    position: fixed;
    bottom: 24px;
    right: 28px;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: #C62828;
    color: #fff;
    border: none;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 2px 10px rgba(0,0,0,.4);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    transition: background .15s;
  }

  #goto-top:hover { background: #E53935; }
  #goto-top.show { display: flex; }
</style>
</head>
<body>

<!-- ── Fixed top bar ── -->
<div class="topbar">
  <div class="topbar-title"><em>●</em>錢包互動架構設計 — 冷熱錢包專項</div>
  <div class="topbar-sep"></div>
  <nav class="jump-bar">
    <button class="jump-btn" onclick="scrollTo('p1')"><span class="n">1</span>架構總覽</button>
    <button class="jump-btn" onclick="scrollTo('p2')"><span class="n">2</span>存入流程</button>
    <button class="jump-btn" onclick="scrollTo('p3')"><span class="n">3</span>提領流程</button>
    <button class="jump-btn" onclick="scrollTo('p4')"><span class="n">4</span>可疑資產</button>
    <button class="jump-btn" onclick="scrollTo('p5')"><span class="n">5</span>Gas Fee</button>
  </nav>
</div>

<!-- ── Scroll area ── -->
<div class="scroll-area">
  <div class="pages">

    <!-- Page 1 -->
    <div class="page-card" id="p1">
      <div class="page-badge">1 / 5</div>
      <div class="page-header">
        <span class="page-header-title">錢包互動架構設計 — 四大錢包獨立架構</span>
      </div>
      <iframe src="wallet_interaction_architecture.html"
              height="740" scrolling="no" title="P1"></iframe>
    </div>

    <div class="page-divider">▼</div>

    <!-- Page 2 -->
    <div class="page-card" id="p2">
      <div class="page-badge">2 / 5</div>
      <div class="page-header">
        <span class="page-header-title">幣流① 存入流程</span>
      </div>
      <iframe src="wallet_flow_02_deposit.html"
              height="768" scrolling="no" title="P2"></iframe>
    </div>

    <div class="page-divider">▼</div>

    <!-- Page 3 -->
    <div class="page-card" id="p3">
      <div class="page-badge">3 / 5</div>
      <div class="page-header">
        <span class="page-header-title">幣流②③ 安全提領流程設計（含角色職責）</span>
      </div>
      <iframe src="wallet_flow_03_withdrawal.html"
              height="840" scrolling="no" title="P3"></iframe>
    </div>

    <div class="page-divider">▼</div>

    <!-- Page 4 -->
    <div class="page-card" id="p4">
      <div class="page-badge">4 / 5</div>
      <div class="page-header">
        <span class="page-header-title">幣流④⑤ 可疑資產處理流程</span>
      </div>
      <iframe src="wallet_flow_04_suspicious.html"
              height="718" scrolling="no" title="P4"></iframe>
    </div>

    <div class="page-divider">▼</div>

    <!-- Page 5 -->
    <div class="page-card" id="p5">
      <div class="page-badge">5 / 5</div>
      <div class="page-header">
        <span class="page-header-title">幣流⑦ Gas Fee 購買流程</span>
      </div>
      <iframe src="wallet_flow_05_gasfee.html"
              height="700" scrolling="no" title="P5"></iframe>
    </div>

  </div>
</div>

<!-- Scroll-to-top -->
<button id="goto-top" title="回到頂部" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
  function scrollTo(id) {
    const el = document.getElementById(id);
    if (!el) return;
    const barH = parseInt(getComputedStyle(document.documentElement)
                          .getPropertyValue('--bar-h')) || 52;
    const top = el.getBoundingClientRect().top + window.scrollY - barH - 12;
    window.scrollTo({ top, behavior: 'smooth' });
  }

  // Show/hide scroll-to-top
  const topBtn = document.getElementById('goto-top');
  window.addEventListener('scroll', () => {
    topBtn.classList.toggle('show', window.scrollY > 400);
  }, { passive: true });

  // Keyboard: number keys jump to page
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key >= '1' && e.key <= '5') scrollTo('p' + e.key);
    if (e.key === 'Home') window.scrollTo({ top: 0, behavior: 'smooth' });
    if (e.key === 'f' || e.key === 'F') {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
      else document.exitFullscreen().catch(()=>{});
    }
  });
</script>
</body>
</html>
