version: "3.9"

# Chain Fusion 本地開發環境
# 生産部署請使用 deploy/k8s/ 目錄下的 Kubernetes 配置

services:

  # ── 基礎設施 ──────────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: changeme
      MYSQL_DATABASE: chain_fusion
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: redis-server --cluster-enabled no  # 本地單節點；生産使用集群模式

  # etcd — APISIX 配置存儲（路由規則、插件配置動態下發）
  etcd:
    image: bitnami/etcd:3.5.12
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
    ports:
      - "2379:2379"
    volumes:
      - etcd_data:/bitnami/etcd

  rocketmq-namesrv:
    image: apache/rocketmq:4.9.7
    command: sh mqnamesrv
    ports:
      - "9876:9876"

  rocketmq-broker:
    image: apache/rocketmq:4.9.7
    command: sh mqbroker -n rocketmq-namesrv:9876
    depends_on:
      - rocketmq-namesrv
    ports:
      - "10911:10911"

  elasticsearch:
    image: elasticsearch:8.12.2
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  kibana:
    image: kibana:8.12.2
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  prometheus:
    image: prom/prometheus:v2.50.1
    volumes:
      - ../config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.3.3
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # ── 流量網關層（APISIX） ─────────────────────────────────────

  # APISIX — 主流量網關（OpenResty + LuaJIT）
  # 負責：TLS 終止、限流、HMAC 鑒權、合規前置、鏈路由分發
  apisix:
    build:
      context: ../../gateway-core/apisix
      dockerfile: Dockerfile
    ports:
      - "9080:9080"    # HTTP 入口（銀行系統對接）
      - "9443:9443"    # HTTPS 入口（TLS 1.3）
      - "9091:9091"    # Prometheus /metrics
    environment:
      - APISIX_STAND_ALONE=false
    volumes:
      - ../../gateway-core/apisix/conf/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - apisix_logs:/usr/local/apisix/logs
    depends_on:
      - etcd
      - route-engine
    restart: unless-stopped

  # APISIX Dashboard（可選，用於可視化管理路由規則）
  apisix-dashboard:
    image: apache/apisix-dashboard:3.0.1-alpine
    ports:
      - "9000:9000"
    depends_on:
      - etcd
    volumes:
      - ../config/apisix-dashboard/conf.yaml:/usr/local/apisix-dashboard/conf/conf.yaml:ro

  # ── 路由決策引擎（Go）────────────────────────────────────────

  # route-engine — 節點健康監控 + 路由決策（供 APISIX 插件調用）
  # 僅內網可訪問，不暴露外部端口
  route-engine:
    build:
      context: ../../gateway-core/route-engine
      dockerfile: Dockerfile
    expose:
      - "8090"
    environment:
      - REDIS_ADDR=redis:6379
      - ROUTE_ENGINE_ADDR=:8090
      - ROUTING_STRATEGY=compliance_first
    depends_on:
      - redis
    restart: unless-stopped

  # ── Chain Fusion 業務服務 ────────────────────────────────────

  protocol-adapter:
    build:
      context: ../../protocol-adapter
      dockerfile: Dockerfile
    expose:
      - "8080"
    depends_on:
      - apisix

  transaction-service:
    build:
      context: ../../transaction-service
      dockerfile: Dockerfile
    expose:
      - "8080"
    depends_on:
      - rocketmq-namesrv
      - redis
      - compliance-service

  compliance-service:
    build:
      context: ../../compliance-service
      dockerfile: Dockerfile
    expose:
      - "8080"
    depends_on:
      - mysql
      - redis

  bank-adapter:
    build:
      context: ../../bank-adapter
      dockerfile: Dockerfile
    expose:
      - "8080"
    ports:
      - "8084:8080"    # 僅暴露 bank-adapter 供測試，生産通過 apisix 進入
    depends_on:
      - apisix

  admin-service:
    build:
      context: ../../admin-service
      dockerfile: Dockerfile
    expose:
      - "8080"
    depends_on:
      - mysql

  data-sync-service:
    build:
      context: ../../data-sync-service
      dockerfile: Dockerfile
    expose:
      - "8080"
    depends_on:
      - mysql
      - redis

volumes:
  mysql_data:
  etcd_data:
  es_data:
  apisix_logs:
