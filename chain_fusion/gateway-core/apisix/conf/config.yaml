apisix:
  node_listen: 9080          # HTTP
  ssl:
    enable: true
    listen_port: 9443        # HTTPS (TLS 1.3)
  enable_ipv6: false

deployment:
  role: traditional
  role_traditional:
    config_provider: etcd

etcd:
  host:
    - "http://etcd:2379"
  prefix: /apisix
  timeout: 30

# 自定義 Lua 插件路徑
extra_lua_path: /usr/local/apisix/plugins/chain-fusion/?.lua

plugins:
  # ── 官方插件（直接啟用）────────────────────────────────────
  - prometheus              # /metrics 指標暴露
  - limit-req               # 請求限流
  - limit-conn              # 連接限流
  - ip-restriction          # IP 白名單
  - cors
  - request-id              # 注入 X-Request-Id（對應 GatewayMessage.request_id）
  - response-rewrite
  - proxy-rewrite
  - grpc-transcode          # HTTP → gRPC 協議轉換
  - zipkin                  # 分佈式鏈路追蹤
  - jwt-auth                # JWT 鑒權
  - key-auth                # API Key 鑒權

  # ── Chain Fusion 自定義插件 ───────────────────────────────
  - chain-fusion-auth       # HMAC-SHA512 簽名驗證（銀行側鑒權）
  - compliance-precheck     # 合規前置校驗（調用 compliance-service）
  - chain-health-route      # 鏈健康度動態路由（調用 route-engine）

plugin_attr:
  prometheus:
    export_uri: /metrics
    export_addr:
      ip: "0.0.0.0"
      port: 9091

nginx_config:
  worker_processes: auto
  worker_rlimit_nofile: 20480
  event:
    worker_connections: 10240
  http:
    access_log: /usr/local/apisix/logs/access.log
    error_log: /usr/local/apisix/logs/error.log
    client_max_body_size: 10m
    keepalive_timeout: 60s
